; ==============================================================
; Asterisk RTP Configuration
; ==============================================================

[general]
; RTP port range for media streams
rtpstart=10000
rtpend=10100
; STUN server for NAT traversal (use a public STUN server)
stunaddr=stun.l.google.com:19302
; ICE support for WebRTC
icesupport=yes
; Strict RTP — drop packets from unexpected sources
strictrtp=yes
; Probation — number of packets before strict RTP activates
probation=4
