; ==============================================================
; Asterisk HTTP Server Configuration
; ==============================================================
; Provides HTTP/HTTPS server for ARI REST API and
; WebSocket (SIP over WS/WSS) signaling.
; ==============================================================

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088
; TLS Configuration
tlsenable=yes
tlsbindaddr=0.0.0.0:8089
; In production, use proper Let's Encrypt certificates:
; tlscertfile=/etc/asterisk/keys/fullchain.pem
; tlsprivatekey=/etc/asterisk/keys/privkey.pem
; For development, Asterisk auto-generates self-signed certs
