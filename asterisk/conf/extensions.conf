; ==============================================================
; Asterisk Extensions (Dialplan)
; ==============================================================
; Minimal dialplan — all calls enter Stasis for ARI control.
; The Go backend handles ALL routing logic via ARI.
; ==============================================================

[general]
static=yes
writeprotect=no

; ─── Default Context ──────────────────────────────────────────
[default]
; Reject unauthenticated calls
exten => _X.,1,Hangup(INTERWORKING)

; ─── CRM Stasis Application Context ──────────────────────────
; All registered WebRTC endpoints use this context.
; Every call immediately enters the 'crm-pbx' Stasis app,
; giving full programmatic control to the Go backend via ARI.
[crm-stasis]
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
 same => n,Answer()
 same => n,Stasis(crm-pbx,${EXTEN})
 same => n,Hangup()

; Handle 's' extension (calls without a specific number)
exten => s,1,NoOp(Call without extension, entering Stasis)
 same => n,Answer()
 same => n,Stasis(crm-pbx)
 same => n,Hangup()

; ─── Voicemail Context ────────────────────────────────────────
[voicemail]
exten => _X.,1,NoOp(Voicemail for ${EXTEN})
 same => n,VoiceMail(${EXTEN}@default)
 same => n,Hangup()
