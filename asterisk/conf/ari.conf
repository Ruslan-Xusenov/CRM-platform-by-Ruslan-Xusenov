; ==============================================================
; Asterisk ARI (REST Interface) Configuration
; ==============================================================

[general]
enabled=yes
pretty=yes
; Allowed origins — restrict to backend only
allowed_origins=http://backend:8080

; ─── CRM ARI User ─────────────────────────────────────────────
[crm_ari]
type=user
read_only=no
password=change-me-ari-password
password_format=plain
