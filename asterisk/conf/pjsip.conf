; ==============================================================
; Asterisk PJSIP Configuration — WebRTC with chan_pjsip
; ==============================================================

; ─── Global Settings ─────────────────────────────────────────
[global]
type=global
max_forwards=70
user_agent=CRM-PBX/1.0
default_outbound_endpoint=default

; ─── WebSocket Transport (WSS — Secure) ──────────────────────
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

; ─── UDP Transport (Internal SIP) ────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; ─── Template for WebRTC Endpoints ────────────────────────────
; All dynamic extensions are registered via ARI/Realtime,
; but this template defines the defaults for WebRTC clients.
[webrtc-endpoint](!)
type=endpoint
transport=transport-wss
context=crm-stasis
disallow=all
allow=opus
allow=ulaw
allow=alaw
; WebRTC mandatory settings
webrtc=yes
dtls_auto_generate_cert=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes
rtcp_mux=yes
; Direct media off — always relay through Asterisk
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
; Codecs
max_audio_streams=1
bundle=yes

; ─── Template for WebRTC Auth ─────────────────────────────────
[webrtc-auth](!)
type=auth
auth_type=userpass

; ─── Template for WebRTC AOR ──────────────────────────────────
[webrtc-aor](!)
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30
qualify_timeout=3

